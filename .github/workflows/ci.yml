name: CI & Trigger Deploy 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 📦
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Generate Prisma Client 💎
        run: npm run db:gen
        env:
          DATABASE_URL: postgresql://johndoe:randompassword@localhost:5432/mydb

      - name: Lint ✅
        run: npm run lint

      - name: Unit & Integration Tests 🧪
        run: npm run test

      - name: Build App 🏗️
        run: npm run build

      # --- Playwright Section ---
      - name: Install Playwright Browsers 🎭
        run: npx playwright install --with-deps

      - name: Run E2E Tests 🚀
        run: npm run test:e2e
        env:
          # Ensure Playwright knows where the built app/dev server is
          # or if your config uses a specific base URL
          CI: true

      # --- Deployment Section ---
      - name: Trigger Render Deploy 🚀
        if: github.ref == 'refs/heads/main' && success()
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
