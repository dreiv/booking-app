name: CI & Trigger Deploy 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 📦
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Generate Prisma Client 💎
        run: npm run db:gen
        env:
          DATABASE_URL: postgresql://johndoe:randompassword@localhost:5432/mydb

      - name: Lint ✅
        run: npm run lint

      - name: Type Check & Test 🧪
        run: |
          npm run test
          npm run build

      - name: Trigger Render Deploy 🚀
        if: github.ref == 'refs/heads/main'
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
