name: CI & Trigger Deploy 🚀

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 📦
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Generate Prisma Client 💎
        run: npm run db:gen
        env:
          DATABASE_URL: postgresql://johndoe:randompassword@localhost:5432/mydb

      - name: Lint ✅
        run: npm run lint

      - name: Unit & Integration Tests 🧪
        run: npm run test

      - name: Build App 🏗️
        run: npm run build

      # --- Heavy E2E Section: Only runs on main ---
      - name: Install Playwright Browsers 🎭
        if: github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps

      # - name: Run E2E Tests
      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     cd client
      #     npx playwright test
      #   env:
      #     VITE_API_URL: http://localhost:3000/api

      # --- Deployment Section: Only runs on main ---
      - name: Trigger Render Deploy 🚀
        if: github.ref == 'refs/heads/main' && success()
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
